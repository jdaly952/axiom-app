workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      node: 22
      groups:
        - ios_credentials
      vars:
        BUNDLE_ID: io.understandable.app
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web app
        script: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Initialize keychain
        script: keychain initialize
      - name: Fetch or create signing files
        script: |
          export CERTIFICATE_PRIVATE_KEY=$(echo "" | base64 -d)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          BUILD_NUM=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist
          echo "Set build number to $BUILD_NUM"
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
